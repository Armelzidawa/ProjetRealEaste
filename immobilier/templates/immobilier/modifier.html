{% extends "immobilier/index.html" %}
{% block title %}Modifier l'annonce – ImmoGest{% endblock %}
{% block content %}
<div class="max-w-2xl mx-auto px-5 py-10">
  <div class="flex items-center justify-between mb-8">
    <a href="/tableau-de-bord/" class="inline-flex items-center gap-2 text-sm text-slate-500 hover:text-slate-800">
      <i data-lucide="arrow-left" style="width:14px;height:14px;"></i> Retour
    </a>
    <h1 class="font-display text-xl font-700 text-slate-900">Modifier l'annonce</h1>
  </div>
  <form method="POST" enctype="multipart/form-data" class="space-y-5">
    {% csrf_token %}
    <div class="card p-6 space-y-4">
      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="block text-xs font-semibold text-slate-600 uppercase tracking-wide mb-1.5">Transaction</label>
          <select name="categorie" class="form-input form-select">
            <option value="vente" {% if bien.categorie == 'vente' %}selected{% endif %}>Vente</option>
            <option value="location" {% if bien.categorie == 'location' %}selected{% endif %}>Location</option>
          </select>
        </div>
        <div>
          <label class="block text-xs mb-1.5">Type de bien</label>
          <select name="type_bien" class="form-input form-select">
            <option value="appartement" {% if bien.type_bien == 'appartement' %}selected{% endif %}>Appartement</option>
            <option value="maison" {% if bien.type_bien == 'maison' %}selected{% endif %}>Maison</option>
            <option value="terrain" {% if bien.type_bien == 'terrain' %}selected{% endif %}>Terrain</option>
            <option value="local" {% if bien.type_bien == 'local' %}selected{% endif %}>Local commercial</option>
            <option value="bureau" {% if bien.type_bien == 'bureau' %}selected{% endif %}>Bureau</option>
          </select>
          
        </div>
      </div>
      <div>
        <label class="block text-xs font-semibold text-slate-600 uppercase tracking-wide mb-1.5">Titre</label>
        <input type="text" name="titre" value="{{ bien.titre }}" required class="form-input">
      </div>
      <div>
        <label class="block text-xs font-semibold text-slate-600 uppercase tracking-wide mb-1.5">Description</label>
        <textarea name="description" rows="4" required class="form-input resize-none">{{ bien.description }}</textarea>
      </div>
      <div class="grid grid-cols-3 gap-4">
        <div>
          <label class="block text-xs font-semibold text-slate-600 uppercase tracking-wide mb-1.5">Prix (FCFA)</label>
          <input type="number" name="prix" value="{{ bien.prix }}" required class="form-input">
        </div>
        <div>
          <label class="block text-xs font-semibold text-slate-600 uppercase tracking-wide mb-1.5">Surface (m²)</label>
          <input type="number" name="surface" value="{{ bien.surface }}" required step="0.1" class="form-input">
        </div>
        <div>
          <label class="block text-xs font-semibold text-slate-600 uppercase tracking-wide mb-1.5">Pièces</label>
          <input type="number" name="nb_pieces" value="{{ bien.nb_pieces }}" class="form-input">
        </div>
      </div>
    </div>
    <div class="card p-6 space-y-4">
      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="block text-xs font-semibold text-slate-600 uppercase tracking-wide mb-1.5">Ville</label>
          <input type="text" name="ville" value="{{ bien.localisation.ville }}" class="form-input">
        </div>
        <div>
          <label class="block text-xs font-semibold text-slate-600 uppercase tracking-wide mb-1.5">Quartier</label>
          <input type="text" name="quartier_loc" value="{{ bien.localisation.quartier }}" class="form-input">
        </div>
      </div>
    </div>
    <div class="card p-6">
      <label class="block text-xs font-semibold text-slate-600 uppercase tracking-wide mb-2">Nouvelles photos (optionnel)</label>
      <input type="file" name="photos" multiple accept="image/*" class="form-input">
    </div>
    <div class="flex gap-3 justify-end">
      <a href="/tableau-de-bord/" class="btn-secondary">Annuler</a>
      <button type="submit" class="btn-primary">
        <i data-lucide="save" style="width:14px;height:14px;"></i> Sauvegarder
      </button>
    </div>
  </form>
</div>
{% endblock %}
{% block extra_js %}<script>lucide.createIcons();</script>{% endblock %}
